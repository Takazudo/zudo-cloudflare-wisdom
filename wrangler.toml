# Cloudflare Workers Static Assets configuration

name = "zudo-cloudflare-wisdom"
main = "./dist/_worker.js"

compatibility_date = "2024-12-01"
# nodejs_compat is required by the CF adapter bundle at dist/_worker.js,
# which imports node:async_hooks (AsyncLocalStorage). Without this flag
# wrangler 4.x refuses to load the worker even when dist/_worker.js exists.
compatibility_flags = ["nodejs_compat"]

# Top-level fields (MUST stay above the [assets] table — in TOML any key after
# a table header is scoped into that table; if these sit under [assets] wrangler
# warns "Unexpected fields found in assets field" and silently ignores them).
#
# preview_urls enables *.workers.dev version-preview URLs for staging/preview
# deploys (consumed by preview-deploy.yml / pr-checks.yml via
# `wrangler versions upload --preview-alias`).
preview_urls = true

# ---------------------------------------------------------------------------
# Static asset serving
#
# not_found_handling = "404-page" serves dist/404.html for unmatched GETs.
#
# run_worker_first = false means the asset layer is consulted before the
# worker script; the worker only runs when no matching asset is found.
#
# .assetsignore mechanism: during deploy-prep a .assetsignore file is written
# into dist/ listing _worker.js and _zfb_inner.mjs so those files are excluded
# from the public asset directory and are not served as downloadable files.
# That file is generated by the deploy workflow — it is NOT committed to the repo.
# ---------------------------------------------------------------------------
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = false

# ---------------------------------------------------------------------------
# Custom domain routing
# ---------------------------------------------------------------------------
[[routes]]
pattern = "zudo-cloudflare.takazudomodular.com"
custom_domain = true
